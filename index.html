header.top{display:flex;align-items:center;justify-content:space-between;background:var(--orange);

.match-row .teams{flex:1;min-width:180px;font-weight:600;font-size:.88rem;}
.match-row input.score{width:55px;text-align:center;}
.vs{color:var(--gray);font-weight:400;}

.done-tag{font-size:.72rem;background:#e6f4ea;color:var(--green);padding:3px 8px;border-radius:12px;}
.bracket-round{margin-bottom:18px;}
.bracket-round h4{color:var(--blue);margin-bottom:8px;}
.ranking-table tr:first-child{background:#fff8e8;}
.ranking-table tr:nth-child(2){background:#f5f5f5;}
.ranking-table tr:nth-child(3){background:#fbeee0;}
.section-title{font-size:1.05rem;color:var(--orange-d);margin-bottom:10px;border-bottom:2px solid var(--orange-l);padding-bottom:6px;}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}

<script>

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const DOC_REF = db.collection('petanque').doc('main');

let STATE = null;       // live tournament document
let ROLE = sessionStorage.getItem('petanque_role') || null; // 'admin' | 'staff' | 'spectator'
let unsub = null;

/* ===================== AUTH (anonymous) + LISTENER ===================== */
auth.signInAnonymously().catch(e=>console.error(e));
auth.onAuthStateChanged(user=>{
  if(user){ attachListener(); }
});

function attachListener(){
  if(unsub) unsub();
  unsub = DOC_REF.onSnapshot(snap=>{
    STATE = snap.exists ? snap.data() : null;
    render();
  }, err=>{ console.error(err); render(); });
}

async function saveState(patch){
  await DOC_REF.set(patch, {merge:true});
}

/* ===================== UTILITAIRES TOURNOI ===================== */
function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }

// Répartition en groupes de 4 (ajustés en 3 ou 5 si nécessaire)
function computeGroupSizes(n){
  const g = Math.floor(n/4), r = n%4;
  let sizes = [];
  if(r===0){ sizes = Array(g).fill(4); }
  else if(r===1){ sizes = Array(g-1).fill(4); sizes.push(5); }
  else if(r===2){ sizes = Array(g-1).fill(4); sizes.push(3,3); }
  else if(r===3){ sizes = Array(g).fill(4); sizes.push(3); }
  return sizes;
}

function generateGroups(teams){
  const shuffled = [...teams].sort(()=>Math.random()-0.5);
  const sizes = computeGroupSizes(shuffled.length);
  const groups = [];
  let idx=0;
  sizes.forEach((sz,i)=>{
    const members = shuffled.slice(idx, idx+sz).map(t=>t.id);
    idx+=sz;
    groups.push({ id: uid('grp'), name:'Groupe '+String.fromCharCode(65+i), teamIds: members });
  });
  return groups;
}

function roundRobinPairs(teamIds){
  const pairs=[];
  for(let i=0;i<teamIds.length;i++)
    for(let j=i+1;j<teamIds.length;j++)
      pairs.push([teamIds[i], teamIds[j]]);
  return pairs;
}

function buildPhase1Matches(groups){
  const matches=[];
  groups.forEach(g=>{
    roundRobinPairs(g.teamIds).forEach(([a,b])=>{
      matches.push({ id: uid('m1'), groupId:g.id, teamA:a, teamB:b, scoreA:null, scoreB:null, court:null, status:'pending', phase:'P1' });
    });
  });
  return matches;
}

function teamName(id){
  const t = STATE.teams.find(t=>t.id===id);
  return t ? t.name : '???';
}

function groupStandings(group, matches){
  const stats = {};
  group.teamIds.forEach(id=> stats[id] = {id, w:0, l:0, pf:0, pa:0, diff:0});
  matches.filter(m=>m.groupId===group.id && m.status==='done').forEach(m=>{
    const a=stats[m.teamA], b=stats[m.teamB];
    a.pf+=m.scoreA; a.pa+=m.scoreB; b.pf+=m.scoreB; b.pa+=m.scoreA;
    if(m.scoreA>m.scoreB){a.w++; b.l++;} else {b.w++; a.l++;}
  });
  Object.values(stats).forEach(s=> s.diff = s.pf - s.pa);
  return Object.values(stats).sort((x,y)=> y.w-x.w || y.diff-x.diff || y.pf-x.pf);
}

function allPhase1Done(){
  return STATE.phase1Matches.every(m=>m.status==='done');
}

// Génère un bracket à élimination directe à partir d'une liste ordonnée d'équipes (avec byes si besoin)
// seedList: array of teamIds already ordered to avoid early same-group clashes
function nextPow2(n){ let p=1; while(p<n) p*=2; return p; }

function buildBracket(seedList, label){
  const size = nextPow2(seedList.length);
  // seeding classique (1 vs size, 2 vs size-1 ...) en intercalant pour limiter les rencontres rapprochées
  const padded = [...seedList];
  while(padded.length<size) padded.push(null); // null = bye
  const order = seedOrder(size);
  const slots = order.map(i=> i<padded.length ? padded[i] : null);
  const roundNames = computeRoundNames(size);
  const rounds = [];
  let current = slots;
  for(let r=0; r<roundNames.length; r++){
    const matches=[];
    for(let i=0;i<current.length;i+=2){
      const a=current[i], b=current[i+1];
      let status='pending', winner=null, scoreA=null, scoreB=null;
      if(a && !b){ status='bye'; winner=a; }
      else if(!a && b){ status='bye'; winner=b; }
      else if(!a && !b){ status='empty'; }
      matches.push({ id: uid('mb'), round:r, roundName:roundNames[r], teamA:a, teamB:b, scoreA, scoreB, court:null, status, winner, bracket:label });
    }
    rounds.push(matches);
    current = matches.map(m=> m.winner || null); // placeholder, sera mis à jour à la résolution réelle
  }
  return rounds.flat();
}

// ordre de seeding standard pour limiter les confrontations précoces entre meilleures graines
function seedOrder(size){
  let seeds=[1];
  while(seeds.length<size){
    const len=seeds.length*2;
    const newSeeds=[];
    seeds.forEach(s=>{ newSeeds.push(s); newSeeds.push(len+1-s); });
    seeds=newSeeds;
  }
  return seeds.map(s=>s-1);
}

function computeRoundNames(size){
  const names=[];
  let s=size;
  while(s>1){
    if(s===2) names.push('Finale');
    else if(s===4) names.push('Demi-finales');
    else if(s===8) names.push('Quarts de finale');
    else if(s===16) names.push('1/8 de finale');
    else if(s===32) names.push('1/16 de finale');
    else names.push('Tour de '+s);
    s/=2;
  }
  return names;
}

// répartition "intelligente" phase1 -> phase2 : on alterne les groupes pour que les 1ers/2nds
// de groupes différents soient opposés en premier tour (évite la revanche immédiate)
function seedPrincipalConsolante(){
  const groups = STATE.groups;
  const principal=[], consolante=[];
  groups.forEach(g=>{
    const standings = groupStandings(g, STATE.phase1Matches);
    standings.forEach((s,rank)=>{
      if(rank<2) principal.push(s.id); else consolante.push(s.id);
    });
  });
  // on entrelace par position de groupe pour éviter loto de clashes (1er grpA, 1er grpB, 1er grpC...)
  function interleaveByGroupRank(list, groups, matches, rankFilterFn){
    const byGroup = groups.map(g=> groupStandings(g, matches).filter(rankFilterFn));
    const out=[]; let i=0; let more=true;
    while(more){ more=false;
      byGroup.forEach(arr=>{ if(arr[i]){ out.push(arr[i].id); more=true; } });
      i++;
    }
    return out;
  }
  const principalSeeded = interleaveByGroupRank(null, groups, STATE.phase1Matches, ()=>true)
    .filter(id=>{}); // placeholder unused
  // simpler: rebuild properly
  const pTop = groups.map(g=> groupStandings(g, STATE.phase1Matches).slice(0,2).map(s=>s.id));
  const cBottom = groups.map(g=> groupStandings(g, STATE.phase1Matches).slice(2).map(s=>s.id));
  const principalFinal=[]; for(let i=0;i<2;i++) pTop.forEach(arr=>{ if(arr[i]) principalFinal.push(arr[i]); });
  const maxC = Math.max(...cBottom.map(a=>a.length));
  const consolanteFinal=[]; for(let i=0;i<maxC;i++) cBottom.forEach(arr=>{ if(arr[i]) consolanteFinal.push(arr[i]); });
  return { principal: principalFinal, consolante: consolanteFinal };
}

/* ===================== RENDU ===================== */
function render(){
  const root = document.getElementById('root');
  if(!ROLE){ root.innerHTML = renderLogin(); attachLoginEvents(); return; }
  if(!STATE || !STATE.config){
    if(ROLE==='admin'){ root.innerHTML = renderSetup(); attachSetupEvents(); }
    else { root.innerHTML = renderWaiting(); }
    return;
  }
  root.innerHTML = renderHeader() + renderTabs() + renderActiveTab();
  attachGlobalEvents();
}

function renderHeader(){
  const cfg = STATE.config;
  return `
  <header class="top">
    <div>
      <h1>🎯 ${cfg.name}</h1>
      <div class="sub">${cfg.teamsCount} équipes · ${cfg.courtsCount} terrains · ${cfg.targetScore} pts${cfg.winByTwo?' (écart 2)':''} · ~${cfg.gameTime} min/partie</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="badge">${ROLE==='admin'?'👑 Organisateur':ROLE==='staff'?'🟢 Marqueur':'👀 Spectateur'}</span>
      <button class="secondary" onclick="logout()">Quitter</button>
    </div>
  </header>`;
}

let ACTIVE_TAB = 'phase1';
function renderTabs(){
  const tabs = [
    {id:'phase1', label:'Phase 1 - Groupes'},
    {id:'phase2', label:'Phase 2 - Tableaux'},
    {id:'classement', label:'Classement final'},
  ];
  if(ROLE==='admin') tabs.push({id:'admin', label:'⚙️ Réglages'});
  return `<div class="tabs">${tabs.map(t=>`<div class="tab ${ACTIVE_TAB===t.id?'active':''}" data-tab="${t.id}">${t.label}</div>`).join('')}</div>`;
}

function renderActiveTab(){
  if(ACTIVE_TAB==='phase1') return renderPhase1();
  if(ACTIVE_TAB==='phase2') return renderPhase2();
  if(ACTIVE_TAB==='classement') return renderClassement();
  if(ACTIVE_TAB==='admin') return renderAdminPanel();
  return '';
}

/* ---------- LOGIN ---------- */
function renderLogin(){
  return `
  <div class="center">
    <h1 style="color:var(--orange-d)">🎯 Tournoi de Pétanque RSTH</h1>
    <p class="small">Choisissez votre profil pour continuer</p>
    <div class="zone-choice">
      <div class="zone-card" id="zone-spectator"><div class="icon">👀</div><b>Spectateur</b><p class="small">Suivre le tournoi en direct</p></div>
      <div class="zone-card" id="zone-staff"><div class="icon">🟠</div><b>Organisateur / Marqueur</b><p class="small">Gérer le tournoi, saisir les scores</p></div>
    </div>
  </div>`;
}
function attachLoginEvents(){
  document.getElementById('zone-spectator').onclick = ()=>{ ROLE='spectator'; sessionStorage.setItem('petanque_role','spectator'); render(); };
  document.getElementById('zone-staff').onclick = ()=> showPinModal();
}
function showPinModal(){
  const root=document.getElementById('root');
  const div=document.createElement('div');
  div.innerHTML=`<div class="modal-bg"><div class="modal">
    <h3 style="margin-bottom:10px;">Code d'accès</h3>
    <input id="pin-input" type="password" placeholder="Code organisateur ou marqueur" />
    <div class="pill-row"><button id="pin-ok">Valider</button><button class="secondary" id="pin-cancel">Annuler</button></div>
    <p class="small" style="margin-top:8px;">Pas de code défini ? Le 1er à se connecter devient organisateur et le crée.</p>
  </div></div>`;
  root.appendChild(div);
  document.getElementById('pin-cancel').onclick=()=>div.remove();
  document.getElementById('pin-ok').onclick= async ()=>{
    const pin = document.getElementById('pin-input').value.trim();
    const snap = await DOC_REF.get();
    const data = snap.exists ? snap.data() : null;
    if(!data || !data.access){
      // premier arrivant = admin, définit les codes
      if(!pin){ alert('Définissez un code (min 4 caractères).'); return; }
      await saveState({ access:{ adminPin: pin, staffPin: pin+'1' } });
      ROLE='admin'; sessionStorage.setItem('petanque_role','admin'); div.remove(); render();
      return;
    }
    if(pin === data.access.adminPin){ ROLE='admin'; }
    else if(pin === data.access.staffPin){ ROLE='staff'; }
    else { alert('Code incorrect.'); return; }
    sessionStorage.setItem('petanque_role', ROLE);
    div.remove(); render();
  };
}
function logout(){ ROLE=null; sessionStorage.removeItem('petanque_role'); render(); }

function renderWaiting(){
  return `<div class="center"><h2>⏳ En attente</h2><p class="small">L'organisateur configure le tournoi…</p></div>`;
}

/* ---------- SETUP (admin, avant génération) ---------- */
function renderSetup(){
  return `
  <div class="card" style="max-width:560px;margin:30px auto;">
    <h2 class="section-title">Création du tournoi de pétanque</h2>
    <label>Nom du tournoi</label>
    <input id="set-name" placeholder="Ex: Tournoi de Pétanque RSTH 2026" value="Tournoi de Pétanque RSTH">
    <div class="grid2">
      <div><label>Nombre d'équipes (16-64)</label><input id="set-teams" type="number" min="16" max="64" value="32"></div>
      <div><label>Nombre de terrains (8-32)</label><input id="set-courts" type="number" min="8" max="32" value="16"></div>
    </div>
    <div class="grid2">
      <div><label>Durée approx. par partie (min)</label><input id="set-time" type="number" value="45"></div>
      <div><label>Points pour gagner</label><input id="set-score" type="number" value="13"></div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;">
      <input type="checkbox" id="set-margin" style="width:auto;"> Exiger 2 points d'écart pour valider la victoire à égalité serrée
    </label>
    <label>Noms des équipes (un par ligne, optionnel — sinon "Équipe 1, 2…")</label>
    <textarea id="set-teamnames" rows="6" placeholder="Les Boulistes du Coin
Pétanque Passion
..."></textarea>
    <button style="margin-top:14px;width:100%;" id="set-generate">Générer les groupes et lancer le tournoi</button>
  </div>`;
}
function attachSetupEvents(){
  document.getElementById('set-generate').onclick = async ()=>{
    const name = document.getElementById('set-name').value.trim() || 'Tournoi de Pétanque RSTH';
    const teamsCount = Math.max(16, Math.min(64, parseInt(document.getElementById('set-teams').value)||32));
    const courtsCount = Math.max(8, Math.min(32, parseInt(document.getElementById('set-courts').value)||16));
    const gameTime = parseInt(document.getElementById('set-time').value)||45;
    const targetScore = parseInt(document.getElementById('set-score').value)||13;
    const winByTwo = document.getElementById('set-margin').checked;
    const namesRaw = document.getElementById('set-teamnames').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const teams=[];
    for(let i=0;i<teamsCount;i++){
      teams.push({ id: uid('team'), name: namesRaw[i] || ('Équipe '+(i+1)) });
    }
    const groups = generateGroups(teams);
    const phase1Matches = buildPhase1Matches(groups);
    await saveState({
      config:{ name, teamsCount, courtsCount, gameTime, targetScore, winByTwo },
      teams, groups, phase1Matches,
      phase2:{ started:false, principalMatches:[], consolanteMatches:[] },
      finalRanking: null,
    });
  };
}

/* ---------- PHASE 1 ---------- */
function renderPhase1(){
  const groups = STATE.groups;
  let html = `<div class="card"><div class="flex-between"><h2 class="section-title" style="border:none;margin:0;">Phase 1 — Poules de qualification</h2>`;
  if((ROLE==='admin'||ROLE==='staff') && allPhase1Done() && !STATE.phase2.started){
    html += `<button class="green" id="launch-phase2">Lancer la Phase 2 ➜</button>`;
  } else if(!allPhase1Done()){
    const remaining = STATE.phase1Matches.filter(m=>m.status!=='done').length;
    html += `<span class="small">${remaining} match(s) restant(s) avant la phase 2</span>`;
  }
  html += `</div></div>`;

  groups.forEach(g=>{
    const standings = groupStandings(g, STATE.phase1Matches);
    const matches = STATE.phase1Matches.filter(m=>m.groupId===g.id);
    html += `<div class="group-block"><h3>${g.name} (${g.teamIds.length} équipes)</h3>`;
    matches.forEach(m=> html += renderMatchRow(m));
    html += `<table><tr><th>Equipe</th><th>V</th><th>D</th><th>Diff</th><th>Qualif.</th></tr>`;
    standings.forEach((s,i)=>{
      html += `<tr><td>${teamName(s.id)}</td><td>${s.w}</td><td>${s.l}</td><td>${s.diff>0?'+':''}${s.diff}</td>
        <td>${i<2?'<span class="done-tag">Principal</span>':'<span class="court-tag">Consolante</span>'}</td></tr>`;
    });
    html += `</table></div>`;
  });
  return html;
}

function renderMatchRow(m){
  const editable = (ROLE==='admin'||ROLE==='staff') && m.status!=='done';
  return `<div class="match-row" data-mid="${m.id}" data-stage="${m.phase==='P1'?'p1':m.bracket}">
    <div class="teams">${teamName(m.teamA)} <span class="vs">vs</span> ${teamName(m.teamB)}</div>
    ${editable ? `
      <input class="score" type="number" min="0" placeholder="-" value="${m.scoreA??''}" data-side="A">
      <span class="vs">-</span>
      <input class="score" type="number" min="0" placeholder="-" value="${m.scoreB??''}" data-side="B">
      <select class="court-select" style="width:auto;">
        <option value="">Terrain</option>
        ${Array.from({length:STATE.config.courtsCount},(_,i)=>i+1).map(c=>`<option value="${c}" ${m.court==c?'selected':''}>T${c}</option>`).join('')}
      </select>
      <button class="save-score" style="padding:6px 12px;">✓</button>
    ` : m.status==='done' ? `<span class="done-tag">${m.scoreA} - ${m.scoreB}</span>` :
        m.status==='bye' ? `<span class="court-tag">Exempt</span>` :
        `<span class="small">En attente du score${m.court?(' · T'+m.court):''}</span>`}
  </div>`;
}

/* ---------- PHASE 2 ---------- */
let P2_TAB = 'principal';
function renderPhase2(){
  if(!STATE.phase2.started){
    return `<div class="card"><p class="small">La phase 2 sera disponible une fois tous les matchs de poules terminés.</p></div>`;
  }
  let html = `<div class="tabs">
    <div class="tab ${P2_TAB==='principal'?'active':''}" data-p2tab="principal">🏆 Tableau Principal</div>
    <div class="tab ${P2_TAB==='consolante'?'active':''}" data-p2tab="consolante">🥈 Consolante</div>
  </div>`;
  const matches = P2_TAB==='principal' ? STATE.phase2.principalMatches : STATE.phase2.consolanteMatches;
  const rounds = [...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
  rounds.forEach(r=>{
    const rm = matches.filter(m=>m.round===r);
    html += `<div class="bracket-round"><h4>${rm[0].roundName}</h4>`;
    rm.forEach(m=>{
      if(m.status==='empty') return;
      if(!m.teamA && !m.teamB) return;
      if(!m.teamA || !m.teamB){
        html += `<div class="match-row"><div class="teams">${m.teamA?teamName(m.teamA):(m.teamB?teamName(m.teamB):'?')}</div><span class="done-tag">Qualifié(e) d'office</span></div>`;
      } else {
        html += renderMatchRow(m);
      }
    });
    html += `</div>`;
  });
  return html;
}

/* ---------- CLASSEMENT FINAL ---------- */
function renderClassement(){
  if(!STATE.finalRanking){
    return `<div class="card"><p class="small">Le classement final sera généré à l'issue des deux tableaux (Principal + Consolante).</p>
      ${(ROLE==='admin') && phase2Complete() ? `<button id="compute-final" class="green" style="margin-top:10px;">Calculer le classement final</button>` : ''}
    </div>`;
  }
  let html = `<div class="card"><h2 class="section-title">🏆 Classement final — ${STATE.config.name}</h2>
  <table class="ranking-table"><tr><th>Rang</th><th>Équipe</th><th>Tableau</th></tr>`;
  STATE.finalRanking.forEach(r=>{
    html += `<tr><td><b>${r.rank}</b></td><td>${teamName(r.teamId)}</td><td>${r.bracket}</td></tr>`;
  });
  html += `</table></div>`;
  return html;
}

function phase2Complete(){
  if(!STATE.phase2.started) return false;
  const all = [...STATE.phase2.principalMatches, ...STATE.phase2.consolanteMatches];
  return all.every(m=> m.status==='done' || m.status==='bye' || m.status==='empty' || (!m.teamA && !m.teamB));
}

/* ---------- ADMIN PANEL ---------- */
function renderAdminPanel(){
  return `<div class="card">
    <h2 class="section-title">⚙️ Réglages</h2>
    <p class="small">Code organisateur: <b>${STATE.access?.adminPin||'-'}</b> · Code marqueur: <b>${STATE.access?.staffPin||'-'}</b></p>
    <button class="secondary" style="margin-top:12px;color:#b33;border-color:#b33;" id="reset-tournament">🗑️ Réinitialiser le tournoi (efface tout)</button>
  </div>`;
}

/* ===================== EVENTS ===================== */
function attachGlobalEvents(){
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.onclick = ()=>{ ACTIVE_TAB = el.dataset.tab; render(); };
  });
  document.querySelectorAll('[data-p2tab]').forEach(el=>{
    el.onclick = ()=>{ P2_TAB = el.dataset.p2tab; render(); };
  });
  const launchBtn = document.getElementById('launch-phase2');
  if(launchBtn) launchBtn.onclick = launchPhase2;

  document.querySelectorAll('.save-score').forEach(btn=>{
    btn.onclick = ()=> saveMatchScore(btn.closest('.match-row'));
  });
  const computeBtn = document.getElementById('compute-final');
  if(computeBtn) computeBtn.onclick = computeFinalRanking;
  const resetBtn = document.getElementById('reset-tournament');
  if(resetBtn) resetBtn.onclick = async ()=>{
    if(confirm('Confirmer la réinitialisation complète du tournoi ?')){
      await DOC_REF.set({});
    }
  };
}

async function saveMatchScore(row){
  const mid = row.dataset.mid;
  const stage = row.dataset.stage;
  const inputs = row.querySelectorAll('.score');
  let scoreA = parseInt(inputs[0].value), scoreB = parseInt(inputs[1].value);
  const courtSel = row.querySelector('.court-select');
  const court = courtSel ? parseInt(courtSel.value)||null : null;
  if(isNaN(scoreA) || isNaN(scoreB)){ alert('Merci de saisir les deux scores.'); return; }
  const cfg = STATE.config;
  const maxScore = Math.max(scoreA, scoreB);
  if(maxScore < cfg.targetScore){ alert('Le score gagnant doit atteindre '+cfg.targetScore+' points.'); return; }
  if(cfg.winByTwo && Math.abs(scoreA-scoreB) < 2){ alert("Il faut 2 points d'écart pour valider la victoire."); return; }
  if(scoreA === scoreB){ alert('Pas d\'égalité possible en pétanque.'); return; }

  if(stage==='p1'){
    const matches = STATE.phase1Matches.map(m=> m.id===mid ? {...m, scoreA, scoreB, court, status:'done'} : m);
    await saveState({ phase1Matches: matches });
  } else {
    const key = stage==='principal' ? 'principalMatches' : 'consolanteMatches';
    let matches = STATE.phase2[key].map(m=> m.id===mid ? {...m, scoreA, scoreB, court, status:'done', winner: scoreA>scoreB? m.teamA : m.teamB} : m);
    matches = propagateWinners(matches);
    await saveState({ ['phase2.'+key]: matches });
  }
}

// propage le(s) gagnant(s) vers le round suivant du bracket
function propagateWinners(matches){
  const rounds = [...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
  for(let r=0;r<rounds.length-1;r++){
    const current = matches.filter(m=>m.round===rounds[r]);
    const next = matches.filter(m=>m.round===rounds[r+1]);
    for(let i=0;i<next.length;i++){
      const a = current[i*2], b = current[i*2+1];
      const winA = a ? (a.status==='done'||a.status==='bye' ? a.winner : null) : null;
      const winB = b ? (b.status==='done'||b.status==='bye' ? b.winner : null) : null;
      if(next[i].teamA !== winA || next[i].teamB !== winB){
        next[i] = {...next[i], teamA: winA, teamB: winB};
        if(next[i].teamA && !next[i].teamB) { next[i].status='bye'; next[i].winner=next[i].teamA; }
        else if(!next[i].teamA && next[i].teamB) { next[i].status='bye'; next[i].winner=next[i].teamB; }
        else if(next[i].teamA && next[i].teamB && next[i].status==='empty'){ next[i].status='pending'; }
      }
    }
  }
  return matches;
}

async function launchPhase2(){
  const { principal, consolante } = seedPrincipalConsolante();
  const principalMatches = buildBracket(principal, 'principal').map(m=>({...m}));
  const consolanteMatches = buildBracket(consolante, 'consolante').map(m=>({...m}));
  const pProp = propagateWinners(principalMatches);
  const cProp = propagateWinners(consolanteMatches);
  await saveState({ phase2: { started:true, principalMatches:pProp, consolanteMatches:cProp } });
  ACTIVE_TAB='phase2';
}

async function computeFinalRanking(){
  function rankBracket(matches, label){
    const rounds = [...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
    const lastRound = rounds[rounds.length-1];
    const final = matches.find(m=>m.round===lastRound);
    const ranking=[];
    if(final){
      ranking.push({teamId: final.winner, bracket:label});
      const loser = final.teamA===final.winner ? final.teamB : final.teamA;
      if(loser) ranking.push({teamId: loser, bracket:label});
    }
    // demi-finalistes perdants ensuite (3e/4e ex-aequo faute de petite finale dédiée)
    if(rounds.length>=2){
      const semis = matches.filter(m=>m.round===lastRound-1 && m.status==='done');
      semis.forEach(m=>{
        const loser = m.teamA===m.winner ? m.teamB : m.teamA;
        if(loser) ranking.push({teamId:loser, bracket:label});
      });
    }
    // quart de finalistes perdants etc.
    for(let r=lastRound-2;r>=0;r--){
      const rm = matches.filter(m=>m.round===r && m.status==='done');
      rm.forEach(m=>{
        const loser = m.teamA===m.winner ? m.teamB : m.teamA;
        if(loser) ranking.push({teamId:loser, bracket:label});
      });
    }
    return ranking;
  }
  const principalRanking = rankBracket(STATE.phase2.principalMatches, 'Principal');
  const consolanteRanking = rankBracket(STATE.phase2.consolanteMatches, 'Consolante');
  const all = [...principalRanking, ...consolanteRanking].map((r,i)=>({rank:i+1, ...r}));
  await saveState({ finalRanking: all });
}

render();
</script>
