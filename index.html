<style>

.stbl{ width:100%;border-collapse:collapse;font-size:13px; }
.stbl th{ padding:8px 6px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);background:var(--s2);border-bottom:2px solid var(--bdr);white-space:nowrap; }

.rank-c{ font-family:'Oswald',sans-serif;font-size:16px;color:var(--dim);width:30px; }
.qualif-p{ color:var(--grn);font-weight:700;font-size:11px; }
.qualif-c{ color:var(--blu);font-weight:700;font-size:11px; }

.rtabs{ display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px; }
.rtab{ padding:6px 14px;border-radius:6px;border:1.5px solid var(--bdr);background:var(--s2);font-family:'Oswald',sans-serif;font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s; }
.rtab.active{ background:var(--grn);border-color:var(--grn);color:#fff; }

.bracket-round h4{ font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.6px;color:var(--blu);margin-bottom:8px; }

.podium{ display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:22px; }
.pod{ text-align:center;padding:20px 16px;border-radius:12px;min-width:150px;border:2px solid; }
.pod-1{ background:linear-gradient(160deg,#fef8e0,#fdf0c0);border-color:#d4a820; }
.pod-2{ background:linear-gradient(160deg,#e8eef8,#d8e4f4);border-color:#5070a0; }

.pod-ico{ font-size:36px;line-height:1;margin-bottom:6px; }
.pod-nm{ font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:.4px;margin-bottom:4px;color:var(--ink2); }

.lunch-block{ background:var(--ylw-bg);border:1.5px dashed var(--ylw);border-radius:8px;padding:10px 14px;margin:14px 0;text-align:center;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.5px;color:#7a4d08; }
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;}

<div id="root"></div>

<script>
/* ===================== FIREBASE ===================== */
const firebaseConfig = {
  apiKey: "AIzaSyDxDZXcVeo1z92jruaYOcJc7Yo_YkEe6kA",
  authDomain: "tournoi-de-petanque-rsth.firebaseapp.com",
  projectId: "tournoi-de-petanque-rsth",
  storageBucket: "tournoi-de-petanque-rsth.firebasestorage.app",
  messagingSenderId: "100446891024",
  appId: "1:100446891024:web:5f717265e874696a1dae95"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const DOC_REF = db.collection('petanque').doc('main');

let STATE = null;
let ROLE = sessionStorage.getItem('petanque_role') || null;
let ACTIVE_STEP = 1;
let P2_TAB = 'principal';

auth.signInAnonymously().catch(e=>console.error(e));
auth.onAuthStateChanged(user=>{ if(user) attachListener(); });

function attachListener(){
  DOC_REF.onSnapshot(snap=>{ STATE = snap.exists ? snap.data() : null; render(); },
    err=>{ console.error(err); render(); });
}
async function saveState(patch){ await DOC_REF.set(patch, {merge:true}); }

/* ===================== HELPERS HORAIRES ===================== */
function addMinutes(timeStr, mins){
  const [h,m] = (timeStr||'09:00').split(':').map(Number);
  const total = h*60 + m + Math.round(mins);
  const hh = Math.floor(total/60)%24, mm = total%60;
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function timeGTE(a,b){ return a >= b; }

/* ===================== LOGIQUE TOURNOI ===================== */
function uid(p){ return p+'_'+Math.random().toString(36).slice(2,9); }

function computeGroupSizes(n){
  const g = Math.floor(n/4), r = n%4;
  if(r===0) return Array(g).fill(4);
  if(r===1){ const a=Array(g-1).fill(4); a.push(5); return a; }
  if(r===2){ const a=Array(g-1).fill(4); a.push(3,3); return a; }
  const a=Array(g).fill(4); a.push(3); return a;
}
function generateGroups(teams){
  const shuffled=[...teams].sort(()=>Math.random()-0.5);
  const sizes=computeGroupSizes(shuffled.length);
  const groups=[]; let idx=0;
  sizes.forEach((sz,i)=>{
    groups.push({ id:uid('grp'), name:'Groupe '+String.fromCharCode(65+i), teamIds: shuffled.slice(idx,idx+sz).map(t=>t.id) });
    idx+=sz;
  });
  return groups;
}

// méthode du cercle : répartit le round-robin d'un groupe en rounds (aucune équipe ne joue 2x dans un round)
function circleRounds(teamIds){
  let ids=[...teamIds];
  if(ids.length%2!==0) ids.push(null);
  const n=ids.length, rounds=[];
  for(let r=0;r<n-1;r++){
    const pairs=[];
    for(let i=0;i<n/2;i++){
      const a=ids[i], b=ids[n-1-i];
      if(a!==null && b!==null) pairs.push([a,b]);
    }
    rounds.push(pairs);
    const last=ids.pop(); ids.splice(1,0,last);
  }
  return rounds;
}

function buildPhase1MatchesAndSchedule(groups, cfg){
  const groupRounds={}; let maxRounds=0;
  groups.forEach(g=>{ const rr=circleRounds(g.teamIds); groupRounds[g.id]=rr; maxRounds=Math.max(maxRounds, rr.length); });
  const matches=[];
  let cursor = cfg.start;
  let lunchDone = !cfg.lunchBreak;
  for(let r=0;r<maxRounds;r++){
    let pairs=[];
    groups.forEach(g=>{ const rr=groupRounds[g.id]; if(rr[r]) rr[r].forEach(([a,b])=> pairs.push({groupId:g.id,a,b})); });
    const waves = Math.max(1, Math.ceil(pairs.length/cfg.courtsCount));
    for(let w=0; w<waves; w++){
      const waveStart = cursor;
      const wavePairs = pairs.slice(w*cfg.courtsCount, (w+1)*cfg.courtsCount);
      wavePairs.forEach((p,ci)=>{
        matches.push({ id:uid('m1'), groupId:p.groupId, teamA:p.a, teamB:p.b, scoreA:null, scoreB:null,
          court: ci+1, time: waveStart, status:'pending', phase:'P1', round:r });
      });
      cursor = addMinutes(cursor, cfg.gameTime + cfg.transitionTime);
      if(cfg.lunchBreak && !lunchDone && timeGTE(cursor, cfg.lunchStart)){
        cursor = addMinutes(cfg.lunchStart, cfg.lunchDuration);
        lunchDone = true;
      }
    }
  }
  return { matches, phase1EndTime: cursor };
}

function teamName(id){ const t=STATE.teams.find(t=>t.id===id); return t? t.name : '???'; }

function groupStandings(group, matches){
  const stats={};
  group.teamIds.forEach(id=> stats[id]={id,w:0,l:0,pf:0,pa:0,diff:0});
  matches.filter(m=>m.groupId===group.id && m.status==='done').forEach(m=>{
    const a=stats[m.teamA], b=stats[m.teamB];
    a.pf+=m.scoreA; a.pa+=m.scoreB; b.pf+=m.scoreB; b.pa+=m.scoreA;
    if(m.scoreA>m.scoreB){a.w++; b.l++;} else {b.w++; a.l++;}
  });
  Object.values(stats).forEach(s=> s.diff=s.pf-s.pa);
  return Object.values(stats).sort((x,y)=> y.w-x.w || y.diff-x.diff || y.pf-x.pf);
}
function allPhase1Done(){ return STATE.phase1Matches.every(m=>m.status==='done'); }

function nextPow2(n){ let p=1; while(p<n) p*=2; return p; }
function seedOrder(size){
  let seeds=[1];
  while(seeds.length<size){
    const len=seeds.length*2, ns=[];
    seeds.forEach(s=>{ ns.push(s); ns.push(len+1-s); });
    seeds=ns;
  }
  return seeds.map(s=>s-1);
}
function computeRoundNames(size){
  const names=[]; let s=size;
  while(s>1){
    if(s===2) names.push('Finale');
    else if(s===4) names.push('Demi-finales');
    else if(s===8) names.push('Quarts de finale');
    else if(s===16) names.push('1/8 de finale');
    else if(s===32) names.push('1/16 de finale');
    else names.push('Tour de '+s);
    s/=2;
  }
  return names;
}
function buildBracketStructure(seedList, label){
  const size=nextPow2(seedList.length);
  const padded=[...seedList]; while(padded.length<size) padded.push(null);
  const order=seedOrder(size);
  const slots=order.map(i=> i<padded.length ? padded[i] : null);
  const roundNames=computeRoundNames(size);
  const rounds=[]; let current=slots;
  for(let r=0;r<roundNames.length;r++){
    const matches=[];
    for(let i=0;i<current.length;i+=2){
      const a=current[i], b=current[i+1];
      let status='pending', winner=null;
      if(a && !b){ status='bye'; winner=a; }
      else if(!a && b){ status='bye'; winner=b; }
      else if(!a && !b){ status='empty'; }
      matches.push({ id:uid('mb'), round:r, roundName:roundNames[r], teamA:a, teamB:b, scoreA:null, scoreB:null,
        court:null, time:null, status, winner, bracket:label });
    }
    rounds.push(matches);
    current = matches.map(m=> m.winner || null);
  }
  return rounds.flat();
}
function scheduleBracket(matches, cfg, startTime){
  const rounds=[...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
  let cursor = startTime;
  rounds.forEach(r=>{
    const rm = matches.filter(m=>m.round===r && (m.status==='pending'));
    const waves = Math.max(1, Math.ceil(rm.length/cfg.courtsCount));
    for(let w=0; w<waves; w++){
      const wave = rm.slice(w*cfg.courtsCount, (w+1)*cfg.courtsCount);
      wave.forEach((m,ci)=>{ m.time=cursor; m.court=ci+1; });
      cursor = addMinutes(cursor, cfg.gameTime + cfg.transitionTime);
    }
  });
  return cursor;
}
function propagateWinners(matches){
  const rounds=[...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
  for(let r=0;r<rounds.length-1;r++){
    const current=matches.filter(m=>m.round===rounds[r]);
    const next=matches.filter(m=>m.round===rounds[r+1]);
    for(let i=0;i<next.length;i++){
      const a=current[i*2], b=current[i*2+1];
      const winA = a ? (a.status==='done'||a.status==='bye' ? a.winner : null) : null;
      const winB = b ? (b.status==='done'||b.status==='bye' ? b.winner : null) : null;
      if(next[i].teamA!==winA || next[i].teamB!==winB){
        next[i]={...next[i], teamA:winA, teamB:winB};
        if(next[i].teamA && !next[i].teamB){ next[i].status='bye'; next[i].winner=next[i].teamA; }
        else if(!next[i].teamA && next[i].teamB){ next[i].status='bye'; next[i].winner=next[i].teamB; }
        else if(next[i].teamA && next[i].teamB && next[i].status==='empty'){ next[i].status='pending'; }
      }
    }
  }
  return matches;
}
function seedPrincipalConsolante(){
  const groups=STATE.groups;
  const pTop = groups.map(g=> groupStandings(g, STATE.phase1Matches).slice(0,2).map(s=>s.id));
  const cBottom = groups.map(g=> groupStandings(g, STATE.phase1Matches).slice(2).map(s=>s.id));
  const principal=[]; for(let i=0;i<2;i++) pTop.forEach(arr=>{ if(arr[i]) principal.push(arr[i]); });
  const maxC=Math.max(...cBottom.map(a=>a.length));
  const consolante=[]; for(let i=0;i<maxC;i++) cBottom.forEach(arr=>{ if(arr[i]) consolante.push(arr[i]); });
  return { principal, consolante };
}

/* ===================== RENDU ===================== */
function render(){
  const root=document.getElementById('root');
  if(!ROLE){ root.innerHTML = renderLogin(); attachLoginEvents(); return; }
  if(!STATE || !STATE.config){
    root.innerHTML = ROLE==='admin' ? renderSetup() : renderWaiting();
    if(ROLE==='admin') attachSetupEvents();
    return;
  }
  root.innerHTML = renderHeader() + renderSteps() + `<div class="wrap">${renderActiveStep()}</div>`;
  attachGlobalEvents();
}

function renderHeader(){
  const cfg=STATE.config;
  return `<div class="hdr">
    <div class="hdr-brand">🎯 ${cfg.name}</div>
    <div class="hdr-sub">${cfg.teamsCount} équipes · ${cfg.courtsCount} terrains · ${cfg.targetScore} pts${cfg.winByTwo?' (écart 2)':''} · début ${cfg.start}</div>
    <div class="hdr-r">
      <span class="badge">${ROLE==='admin'?'👑 Organisateur':ROLE==='staff'?'🟢 Marqueur':'👀 Spectateur'}</span>
      <button class="hdr-btn" onclick="logout()">Quitter</button>
    </div>
  </div>`;
}

function renderSteps(){
  const steps=[
    {id:1,label:'Poules · Phase 1'},
    {id:2,label:'Tableaux · Phase 2'},
    {id:3,label:'Classement final'},
  ];
  if(ROLE==='admin') steps.push({id:4,label:'⚙️ Réglages'});
  let html='<div class="steps">';
  steps.forEach((s,i)=>{
    html += `<div class="step ${ACTIVE_STEP===s.id?'active':ACTIVE_STEP>s.id?'done':''}" data-step="${s.id}">
      <div class="step-n">${s.id}</div><span>${s.label}</span></div>`;
    if(i<steps.length-1) html += `<div class="step-ln ${ACTIVE_STEP>s.id?'done':''}"></div>`;
  });
  return html+'</div>';
}
function renderActiveStep(){
  if(ACTIVE_STEP===1) return renderPhase1();
  if(ACTIVE_STEP===2) return renderPhase2();
  if(ACTIVE_STEP===3) return renderClassement();
  if(ACTIVE_STEP===4) return renderAdminPanel();
  return '';
}

function attachLoginEvents(){
  document.getElementById('zone-spectator').onclick=()=>{ ROLE='spectator'; sessionStorage.setItem('petanque_role','spectator'); render(); };
  document.getElementById('zone-staff').onclick=()=> showPinModal();
}
function showPinModal(){
  const div=document.createElement('div');
  div.innerHTML=`<div class="modal-bg"><div class="modal">
    <div class="card-ttl">Code d'accès</div>
    <input id="pin-input" type="password" placeholder="Code organisateur ou marqueur">
    <div class="fr mt12"><button class="btn btn-g" id="pin-ok">Valider</button><button class="btn btn-ghost" id="pin-cancel">Annuler</button></div>
    <p class="info info-b mt12">Pas de code défini ? Le premier arrivant devient organisateur et le crée.</p>
  </div></div>`;
  document.body.appendChild(div);
  document.getElementById('pin-cancel').onclick=()=>div.remove();
  document.getElementById('pin-ok').onclick= async ()=>{
    const pin=document.getElementById('pin-input').value.trim();
    const snap=await DOC_REF.get();
    const data=snap.exists?snap.data():null;
    if(!data || !data.access){
      if(!pin){ alert('Définissez un code (min 4 caractères).'); return; }
      await saveState({ access:{ adminPin:pin, staffPin:pin+'1' } });
      ROLE='admin'; sessionStorage.setItem('petanque_role','admin'); div.remove(); render(); return;
    }
    if(pin===data.access.adminPin) ROLE='admin';
    else if(pin===data.access.staffPin) ROLE='staff';
    else { alert('Code incorrect.'); return; }
    sessionStorage.setItem('petanque_role',ROLE); div.remove(); render();
  };
}
function logout(){ ROLE=null; sessionStorage.removeItem('petanque_role'); render(); }

/* ---------- PHASE 1 ---------- */
function renderPhase1(){
  let html=`<div class="sec-ttl">Phase 1 — Poules de qualification</div>`;
  html += `<div class="info info-b">📅 Début ${STATE.config.start}${STATE.config.lunchBreak?` · 🍽️ Pause déjeuner vers ${STATE.config.lunchStart} (${STATE.config.lunchDuration} min)`:''} · ⏱ ${STATE.config.gameTime} min/partie + ${STATE.config.transitionTime} min de transition</div>`;
  if((ROLE==='admin'||ROLE==='staff')){
    if(allPhase1Done() && !STATE.phase2.started){
      html += `<div class="mt12"><button class="btn btn-g" id="launch-phase2">Lancer la Phase 2 ➜</button></div>`;
    } else if(!allPhase1Done()){
      const remaining=STATE.phase1Matches.filter(m=>m.status!=='done').length;
      html += `<p class="mt12" style="font-size:12px;color:var(--muted);">${remaining} match(s) restant(s) avant la phase 2</p>`;
    }
  }
  STATE.groups.forEach(g=>{
    const standings=groupStandings(g, STATE.phase1Matches);
    const matches=STATE.phase1Matches.filter(m=>m.groupId===g.id).sort((a,b)=> (a.time>b.time?1:-1));
    html += `<div class="group-ttl">${g.name} (${g.teamIds.length} équipes)</div><div class="card">`;
    matches.forEach(m=> html+=renderMatchRow(m,'p1'));
    html += `<table class="stbl mt12"><tr><th>#</th><th>Équipe</th><th>V</th><th>D</th><th>Diff</th><th>Qualif.</th></tr>`;
    standings.forEach((s,i)=>{
      html += `<tr><td class="rank-c">${i+1}</td><td>${teamName(s.id)}</td><td>${s.w}</td><td>${s.l}</td><td>${s.diff>0?'+':''}${s.diff}</td>
        <td>${i<2?'<span class="qualif-p">Principal</span>':'<span class="qualif-c">Consolante</span>'}</td></tr>`;
    });
    html += `</table></div>`;
  });
  return html;
}

function renderMatchRow(m, stage){
  const editable=(ROLE==='admin'||ROLE==='staff') && m.status!=='done';
  const timeLbl = m.time ? `🕐 ${m.time}` : '';
  const courtLbl = m.court ? `Terrain ${m.court}` : '';
  return `<div class="mc ${m.status==='done'?'done-mc':''}" data-mid="${m.id}" data-stage="${stage}">
    <div><div class="mt-meta">${[timeLbl,courtLbl].filter(Boolean).join(' · ')}</div><div class="mt-nm">${teamName(m.teamA)}</div></div>
    ${editable ? `<input class="sinp" type="number" min="0" value="${m.scoreA??''}" data-side="A">` :
      `<div class="mt-nm" style="text-align:right;color:var(--grn);">${m.status==='done'?m.scoreA:''}</div>`}
    <div class="vs-lbl">VS</div>
    ${editable ? `<input class="sinp" type="number" min="0" value="${m.scoreB??''}" data-side="B">` :
      `<div class="mt-nm" style="color:var(--grn);">${m.status==='done'?m.scoreB:''}</div>`}
    <div class="mt-r mt-nm">${teamName(m.teamB)}</div>
    ${editable ? `<div class="mc-actions"><button class="btn btn-g btn-sm save-score">✓ Valider</button></div>` :
      m.status==='bye' ? `<div class="mc-actions"><span class="qualif-p">Exempt — qualifié(e) d'office</span></div>` : ''}
  </div>`;
}

/* ---------- PHASE 2 ---------- */
function renderPhase2(){
  if(!STATE.phase2.started){
    return `<div class="sec-ttl">Phase 2 — Tableaux à élimination directe</div>
      <div class="info info-y">Disponible une fois tous les matchs de poules terminés (onglet Phase 1).</div>`;
  }
  let html=`<div class="sec-ttl">Phase 2 — Tableaux à élimination directe</div>
    <div class="rtabs">
      <div class="rtab ${P2_TAB==='principal'?'active':''}" data-p2tab="principal">🏆 Tableau Principal</div>
      <div class="rtab ${P2_TAB==='consolante'?'active':''}" data-p2tab="consolante">🥈 Consolante</div>
    </div>`;
  const matches=P2_TAB==='principal'?STATE.phase2.principalMatches:STATE.phase2.consolanteMatches;
  const rounds=[...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
  rounds.forEach(r=>{
    const rm=matches.filter(m=>m.round===r);
    html += `<div class="bracket-round"><h4>${rm[0].roundName}</h4>`;
    rm.forEach(m=>{
      if(m.status==='empty' || (!m.teamA && !m.teamB)) return;
      if(!m.teamA || !m.teamB){
        html += `<div class="mc"><div class="mt-nm">${m.teamA?teamName(m.teamA):(m.teamB?teamName(m.teamB):'?')}</div><div></div><div></div><div></div><div class="mc-actions"><span class="qualif-p">Qualifié(e) d'office</span></div></div>`;
      } else {
        html += renderMatchRow(m, P2_TAB);
      }
    });
    html += `</div>`;
  });
  return html;
}

/* ---------- CLASSEMENT FINAL ---------- */
function renderClassement(){
  if(!STATE.finalRanking){
    return `<div class="sec-ttl">Classement final</div>
      <div class="info info-y">Sera généré une fois les deux tableaux (Principal + Consolante) terminés.</div>
      ${ROLE==='admin' && phase2Complete() ? `<button class="btn btn-g mt12" id="compute-final">Calculer le classement final</button>` : ''}`;
  }
  const top3=STATE.finalRanking.slice(0,3);
  const icons=['🥇','🥈','🥉'];
  let html=`<div class="sec-ttl">🏆 Classement final — ${STATE.config.name}</div>`;
  html += `<div class="podium">`;
  top3.forEach((r,i)=>{
    html += `<div class="pod pod-${i+1}"><div class="pod-ico">${icons[i]}</div><div class="pod-nm">${teamName(r.teamId)}</div><div style="font-size:11px;color:var(--muted);">${r.bracket}</div></div>`;
  });
  html += `</div><table class="stbl"><tr><th>Rang</th><th>Équipe</th><th>Tableau</th></tr>`;
  STATE.finalRanking.forEach(r=>{
    html += `<tr><td class="rank-c">${r.rank}</td><td>${teamName(r.teamId)}</td><td>${r.bracket}</td></tr>`;
  });
  html += `</table>`;
  return html;
}
function phase2Complete(){
  if(!STATE.phase2.started) return false;
  const all=[...STATE.phase2.principalMatches, ...STATE.phase2.consolanteMatches];
  return all.every(m=> m.status==='done' || m.status==='bye' || m.status==='empty' || (!m.teamA && !m.teamB));
}

    <div class="card mt12">
      <div class="card-ttl">Horaires</div>

      <p style="font-size:13px;">Pause déjeuner : <b>${STATE.config.lunchBreak ? STATE.config.lunchStart+' ('+STATE.config.lunchDuration+' min)' : 'désactivée'}</b></p>
      <p style="font-size:11px;color:var(--muted);margin-top:6px;">Fin estimée Phase 1 : ${STATE.phase1EndTime||'-'}</p>

      <button class="btn btn-danger" id="reset-tournament">🗑️ Réinitialiser le tournoi (efface tout)</button>
    </div>`;

/* ===================== EVENTS ===================== */
function attachGlobalEvents(){
  document.querySelectorAll('[data-step]').forEach(el=> el.onclick=()=>{ ACTIVE_STEP=parseInt(el.dataset.step); render(); });
  document.querySelectorAll('[data-p2tab]').forEach(el=> el.onclick=()=>{ P2_TAB=el.dataset.p2tab; render(); });
  const launchBtn=document.getElementById('launch-phase2'); if(launchBtn) launchBtn.onclick=launchPhase2;
  document.querySelectorAll('.save-score').forEach(btn=> btn.onclick=()=> saveMatchScore(btn.closest('.mc')));
  const computeBtn=document.getElementById('compute-final'); if(computeBtn) computeBtn.onclick=computeFinalRanking;
  const resetBtn=document.getElementById('reset-tournament');
  if(resetBtn) resetBtn.onclick= async ()=>{ if(confirm('Confirmer la réinitialisation complète ?')) await DOC_REF.set({}); };
}

async function saveMatchScore(row){
  const mid=row.dataset.mid, stage=row.dataset.stage;
  const inputs=row.querySelectorAll('.sinp');
  const scoreA=parseInt(inputs[0].value), scoreB=parseInt(inputs[1].value);
  if(isNaN(scoreA)||isNaN(scoreB)){ alert('Merci de saisir les deux scores.'); return; }
  const cfg=STATE.config, maxScore=Math.max(scoreA,scoreB);
  if(maxScore<cfg.targetScore){ alert('Le score gagnant doit atteindre '+cfg.targetScore+' points.'); return; }
  if(cfg.winByTwo && Math.abs(scoreA-scoreB)<2){ alert("Il faut 2 points d'écart pour valider la victoire."); return; }
  if(scoreA===scoreB){ alert('Pas d\'égalité possible en pétanque.'); return; }

  if(stage==='p1'){
    const matches=STATE.phase1Matches.map(m=> m.id===mid ? {...m, scoreA, scoreB, status:'done'} : m);
    await saveState({ phase1Matches: matches });
  } else {
    const key=stage==='principal' ? 'principalMatches' : 'consolanteMatches';
    let matches=STATE.phase2[key].map(m=> m.id===mid ? {...m, scoreA, scoreB, status:'done', winner: scoreA>scoreB?m.teamA:m.teamB} : m);
    matches=propagateWinners(matches);
    await saveState({ ['phase2.'+key]: matches });
  }
}

async function launchPhase2(){
  const cfg=STATE.config;
  const { principal, consolante } = seedPrincipalConsolante();
  let principalMatches=buildBracketStructure(principal,'principal');
  let consolanteMatches=buildBracketStructure(consolante,'consolante');
  principalMatches=propagateWinners(principalMatches);
  consolanteMatches=propagateWinners(consolanteMatches);
  let cursorP = STATE.phase1EndTime;
  scheduleBracket(principalMatches, cfg, cursorP);
  scheduleBracket(consolanteMatches, cfg, cursorP);
  await saveState({ phase2:{ started:true, principalMatches, consolanteMatches } });
  ACTIVE_STEP=2;
}

async function computeFinalRanking(){
  function rankBracket(matches,label){
    const rounds=[...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
    const lastRound=rounds[rounds.length-1];
    const final=matches.find(m=>m.round===lastRound);
    const ranking=[];
    if(final){
      ranking.push({teamId:final.winner, bracket:label});
      const loser=final.teamA===final.winner?final.teamB:final.teamA;
      if(loser) ranking.push({teamId:loser, bracket:label});
    }
    for(let r=lastRound-1;r>=0;r--){
      matches.filter(m=>m.round===r && m.status==='done').forEach(m=>{
        const loser=m.teamA===m.winner?m.teamB:m.teamA;
        if(loser) ranking.push({teamId:loser, bracket:label});
      });
    }
    return ranking;
  }
  const principalRanking=rankBracket(STATE.phase2.principalMatches,'Principal');
  const consolanteRanking=rankBracket(STATE.phase2.consolanteMatches,'Consolante');
  const all=[...principalRanking, ...consolanteRanking].map((r,i)=>({rank:i+1, ...r}));
  await saveState({ finalRanking: all });
}

render();
</script>
